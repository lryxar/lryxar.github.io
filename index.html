<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>lryxar</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#000;
color:#fff;
font-family:'Orbitron',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

/* النجوم */

.stars{
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:120px 120px;
opacity:0.4;
z-index:-1;
}

/* البطاقة */

.card{
background:#050505;
padding:25px;
border-radius:18px;
text-align:center;
width:250px;
box-shadow:0 0 40px rgba(255,255,255,0.15);
animation:fade 1.5s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* الصورة */

.avatar{
width:85px;
height:85px;
border-radius:50%;
border:2px solid white;
box-shadow:0 0 15px white;
margin-bottom:10px;
}

/* الاسم */

.name{
font-size:24px;
font-weight:700;
margin-bottom:5px;
animation:glitch 1s;
}

/* glitch */

@keyframes glitch{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(2px,-2px)}
60%{transform:translate(-1px,1px)}
80%{transform:translate(1px,-1px)}
100%{transform:translate(0)}
}

/* الوصف */

.bio{
font-size:11px;
color:#aaa;
margin-bottom:15px;
}

/* الروابط */

.link{
background:#111;
padding:10px;
margin:7px 0;
border-radius:10px;
cursor:pointer;
transition:0.25s;
}

.link:hover{
background:#222;
transform:scale(1.07);
box-shadow:0 0 10px white;
}

.app{
font-size:13px;
font-weight:bold;
}

.user{
font-size:11px;
color:#bbb;
}

/* اشعار النسخ */

.copymsg{
position:fixed;
bottom:20px;
background:#111;
padding:8px 14px;
border-radius:8px;
font-size:12px;
display:none;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

<img src="avatar.png" class="avatar">

<div class="name">lryxar</div>

<div class="bio">
welcome to my page
</div>

<div class="link" onclick="copyDiscord()">
<div class="app"><i class="fa-brands fa-discord"></i> Discord</div>
<div class="user">@l19r</div>
</div>

<div class="link" onclick="openTiktok()">
<div class="app"><i class="fa-brands fa-tiktok"></i> TikTok</div>
<div class="user">@lryxar7</div>
</div>

<div class="link" onclick="openYoutube()">
<div class="app"><i class="fa-brands fa-youtube"></i> YouTube</div>
<div class="user">@lryxar</div>
</div>

<div class="link" onclick="openInstagram()">
<div class="app"><i class="fa-brands fa-instagram"></i> Instagram</div>
<div class="user">@t_2gq</div>
</div>

</div>

<div class="copymsg" id="copymsg">Copied</div>

<script>

function copyDiscord(){
navigator.clipboard.writeText("@l19r");
let msg=document.getElementById("copymsg");
msg.style.display="block";
setTimeout(()=>{msg.style.display="none"},1500);
}

function openTiktok(){
window.open("https://www.tiktok.com/@lryxar7");
}

function openYoutube(){
window.open("https://www.youtube.com/@lryxar");
}

function openInstagram(){
window.open("https://www.instagram.com/t_2gq");
}

document.addEventListener("contextmenu", e => e.preventDefault());

</script>

</body>
</html>
