<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>lryxar</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
background:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://raw.githubusercontent.com/VincentGarreau/particles.js/master/demo/media/starfield.png");
animation:starsMove 200s linear infinite;
opacity:0.6;
z-index:-1;
}

@keyframes starsMove{
from{background-position:0 0;}
to{background-position:8000px 4000px;}
}

#intro{
position:fixed;
background:black;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:18px;
z-index:20;
cursor:pointer;
}

.enter{
opacity:0.7;
font-size:14px;
margin-top:10px;
}

.musicBtn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
cursor:pointer;
opacity:0.8;
z-index:5;
}

.musicBtn:hover{
opacity:1;
}

.card{
background:#050505;
padding:25px;
border-radius:18px;
text-align:center;
width:260px;
box-shadow:0 0 25px rgba(255,255,255,0.15);
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
border:2px solid white;
box-shadow:0 0 12px white;
margin-bottom:10px;
}

.name{
font-size:24px;
font-weight:bold;
}

.bio{
font-size:12px;
color:#aaa;
margin-bottom:15px;
}

.link{
background:#111;
padding:10px;
margin:7px 0;
border-radius:10px;
cursor:pointer;
transition:0.25s;
}

.link:hover{
background:#222;
transform:scale(1.05);
box-shadow:0 0 10px white;
}

.app{
font-size:13px;
font-weight:bold;
}

.user{
font-size:11px;
color:#bbb;
}

</style>

</head>

<body>

<div id="intro">
<div>Welcome</div>
<div class="enter">Click anywhere to enter</div>
</div>

<div class="stars"></div>

<div class="musicBtn" onclick="toggleMusic()">
<i id="musicIcon" class="fa-solid fa-volume-xmark"></i>
</div>

<div class="card">

<img src="avatar.png" class="avatar">

<div class="name">lryxar</div>

<div class="bio">لريكسار</div>

<div class="link" onclick="copyDiscord()">
<div class="app"><i class="fa-brands fa-discord"></i> Discord</div>
<div class="user">@l19r</div>
</div>

<div class="link" onclick="openTiktok()">
<div class="app"><i class="fa-brands fa-tiktok"></i> TikTok</div>
<div class="user">@lryxar7</div>
</div>

<div class="link" onclick="openYoutube()">
<div class="app"><i class="fa-brands fa-youtube"></i> YouTube</div>
<div class="user">@lryxar</div>
</div>

<div class="link" onclick="openInstagram()">
<div class="app"><i class="fa-brands fa-instagram"></i> Instagram</div>
<div class="user">@t_2gq</div>
</div>

</div>

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let entered=false

document.getElementById("intro").addEventListener("click",function(){

if(entered) return

entered=true

document.getElementById("intro").style.display="none"

let music=document.getElementById("bgmusic")

music.play()

document.getElementById("musicIcon").className="fa-solid fa-volume-high"

})

function toggleMusic(){

let music=document.getElementById("bgmusic")
let icon=document.getElementById("musicIcon")

if(music.paused){

music.play()
icon.className="fa-solid fa-volume-high"

}else{

music.pause()
icon.className="fa-solid fa-volume-xmark"

}

}

function copyDiscord(){
navigator.clipboard.writeText("@l19r")
}

function openTiktok(){
window.open("https://www.tiktok.com/@lryxar7")
}

function openYoutube(){
window.open("https://www.youtube.com/@lryxar")
}

function openInstagram(){
window.open("https://www.instagram.com/t_2gq")
}

</script>

</body>
</html>
