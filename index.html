<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lryxar</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

/* glitch intro */

.glitch{
position:absolute;
top:40%;
font-size:40px;
font-weight:bold;
animation:glitch 1.5s forwards;
}

@keyframes glitch{
0%{opacity:1;transform:translate(0)}
20%{transform:translate(-4px,3px)}
40%{transform:translate(4px,-3px)}
60%{transform:translate(-3px,2px)}
80%{transform:translate(2px,-2px)}
100%{opacity:0}
}

/* card */

.card{
background:#0a0a0a;
padding:25px;
border-radius:18px;
text-align:center;
width:260px;
box-shadow:0 0 30px rgba(255,255,255,0.1);
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* avatar */

.avatar{
width:80px;
height:80px;
border-radius:50%;
border:2px solid white;
margin-bottom:10px;
}

/* name */

.name{
font-size:22px;
font-weight:bold;
}

/* bio */

.bio{
font-size:11px;
color:#aaa;
margin-bottom:15px;
}

/* link boxes */

.link{
background:#111;
padding:10px;
margin:7px 0;
border-radius:10px;
cursor:pointer;
transition:0.25s;
}

.link:hover{
background:#222;
transform:scale(1.05);
}

/* app name */

.app{
font-size:14px;
font-weight:bold;
}

/* username */

.user{
font-size:12px;
color:#bbb;
}

</style>
</head>

<body>

<div class="glitch">lryxar</div>

<div class="card">

<img src="avatar.png" class="avatar">

<div class="name">lryxar</div>

<div class="bio">
welcome to my page
</div>

<div class="link" onclick="copyDiscord()">
<div class="app"><i class="fa-brands fa-discord"></i> Discord</div>
<div class="user">@l19r</div>
</div>

<div class="link" onclick="openTiktok()">
<div class="app"><i class="fa-brands fa-tiktok"></i> TikTok</div>
<div class="user">@lryxar7</div>
</div>

<div class="link" onclick="openYoutube()">
<div class="app"><i class="fa-brands fa-youtube"></i> YouTube</div>
<div class="user">@lryxar</div>
</div>

<div class="link" onclick="openInstagram()">
<div class="app"><i class="fa-brands fa-instagram"></i> Instagram</div>
<div class="user">@t_2gq</div>
</div>

</div>

<script>

function copyDiscord(){
navigator.clipboard.writeText("@l19r");
}

function openTiktok(){
window.open("https://www.tiktok.com/@lryxar7");
}

function openYoutube(){
window.open("https://www.youtube.com/@lryxar");
}

function openInstagram(){
window.open("https://www.instagram.com/t_2gq");
}

document.addEventListener("contextmenu", e => e.preventDefault());

</script>

</body>
</html>
