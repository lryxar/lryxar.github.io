<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>lryxar</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* البطاقة */

.card{
background:#0a0a0a;
padding:35px;
border-radius:18px;
text-align:center;
width:340px;
box-shadow:0 0 25px rgba(255,255,255,0.1);
}

/* الصورة */

.avatar{
width:120px;
height:120px;
border-radius:50%;
border:3px solid white;
margin-bottom:15px;
}

/* الاسم */

.name{
font-size:32px;
font-weight:bold;
}

/* الوصف */

.bio{
font-size:13px;
color:#aaa;
margin-bottom:20px;
}

/* الروابط */

.link{
background:#111;
padding:14px;
margin:10px 0;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.link:hover{
background:#222;
}

/* اسم التطبيق */

.app{
font-size:16px;
font-weight:bold;
}

/* اليوزر */

.user{
font-size:14px;
color:#bbb;
}

</style>
</head>

<body>

<div class="card">

<img src="avatar.png" class="avatar">

<div class="name">lryxar</div>

<div class="bio">
Welcome to my personal site
</div>

<div class="link" onclick="copyDiscord()">
<div class="app"><i class="fa-brands fa-discord"></i> Discord</div>
<div class="user">@l19r</div>
</div>

<div class="link" onclick="openTiktok()">
<div class="app"><i class="fa-brands fa-tiktok"></i> TikTok</div>
<div class="user">@lryxar7</div>
</div>

<div class="link" onclick="openYoutube()">
<div class="app"><i class="fa-brands fa-youtube"></i> YouTube</div>
<div class="user">@lryxar</div>
</div>

<div class="link" onclick="openInstagram()">
<div class="app"><i class="fa-brands fa-instagram"></i> Instagram</div>
<div class="user">@t_2gq</div>
</div>

</div>

<script>

function copyDiscord(){
navigator.clipboard.writeText("@l19r");
alert("Discord username copied");
}

function openTiktok(){
window.open("https://www.tiktok.com/@lryxar7");
}

function openYoutube(){
window.open("https://www.youtube.com/@lryxar");
}

function openInstagram(){
window.open("https://www.instagram.com/t_2gq");
}

</script>

</body>
</html>
